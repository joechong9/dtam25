const BSPC = 8, BR = 2.6;

function bubbleXs(col, nOptions) {
  const cx = col === 'A' ? COL_A_X : COL_B_X;
  const cw = col === 'A' ? COL_A_W : COL_B_W;
  const stmt_w = cw - nOptions * BSPC - BSPC;
  return Array.from({length: nOptions}, (_, i) => cx + stmt_w + BSPC/2 + i * BSPC);
}

function computeItemPositions(section) {
  const nOpt = section.options.length;
  const bxs  = bubbleXs(section.col, nOpt);
  return section.items.map((item, i) => ({
    ...item,
    section_id:    section.id,
    section_label: section.label,
    page:          section.page,
    options:       section.options,
    option_labels: section.option_labels || section.options,
    bubble_xs:     bxs,
    y_mm:          section.y_start + SECTION_HDR_H + i * section.row_h + section.row_h / 2,
  }));
}

function toGrayscaleCanvas(imgEl) {
  const c = document.createElement('canvas');
  c.width  = imgEl.naturalWidth  || imgEl.width;
  c.height = imgEl.naturalHeight || imgEl.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(imgEl, 0, 0);
  const id = ctx.getImageData(0, 0, c.width, c.height);
  const d  = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    d[i] = d[i+1] = d[i+2] = g;
  }
  ctx.putImageData(id, 0, 0);
  return c;
}

function sampleBubble(ctx, cw, ch, x_mm, y_mm) {
  const sx = cw / PAGE_W, sy = ch / PAGE_H;
  const cx = Math.round(x_mm * sx), cy = Math.round(y_mm * sy);
  const r  = Math.max(3, Math.round(BR * sx));
  const x0 = Math.max(0, cx-r), y0 = Math.max(0, cy-r);
  const w  = Math.min(cw-x0, 2*r), h = Math.min(ch-y0, 2*r);
  if (w <= 0 || h <= 0) return 0;
  const { data } = ctx.getImageData(x0, y0, w, h);
  let dark = 0, total = 0;
  for (let py = 0; py < h; py++) {
    for (let px = 0; px < w; px++) {
      const dx = px-r, dy = py-r;
      if (dx*dx + dy*dy <= r*r) {
        total++;
        if (data[(py*w+px)*4] < 130) dark++;
      }
    }
  }
  return total > 0 ? dark/total : 0;
}

function readItem(grayCanvas, item, calibration) {
  const ctx = grayCanvas.getContext('2d');
  const cw  = grayCanvas.width, ch = grayCanvas.height;
  const cal = (calibration && calibration[item.section_id]) || {};
  const dy  = cal.dy_mm || 0;
  const fills = item.bubble_xs.map(bx => sampleBubble(ctx, cw, ch, bx, item.y_mm + dy));
  const maxFill = Math.max(...fills);
  const THRESH  = 0.28, AMB_T = 0.18;
  const selIdx  = maxFill > THRESH ? fills.indexOf(maxFill) : -1;
  return {
    ...item,
    fills, maxFill,
    selectedIndex: selIdx,
    selectedValue: selIdx >= 0 ? item.options[selIdx] : null,
    ambiguous:   maxFill > THRESH && fills.filter(f => f > AMB_T).length > 1,
    no_response: maxFill <= THRESH,
  };
}

function processPage(grayCanvas, allItems, pageNum, calibration) {
  return allItems.filter(i => i.page === pageNum).map(i => readItem(grayCanvas, i, calibration));
}

// Scoring
function mean(vals) { return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null; }
function getVals(results, codes) {
  return results.filter(r=>codes.includes(r.code)&&r.selectedValue).map(r=>Number(r.selectedValue));
}

function computeScores(results) {
  const tam = {
    pu_mean:   mean(getVals(results,['PU_1','PU_2','PU_3','PU_4','PU_5']))?.toFixed(2),
    peou_mean: mean(getVals(results,['PEOU_1','PEOU_2','PEOU_3','PEOU_4','PEOU_5']))?.toFixed(2),
  };
  tam.tam_mean = mean([tam.pu_mean,tam.peou_mean].filter(Boolean).map(Number))?.toFixed(2);

  const utaut2Constructs = {EE:['EE_1','EE_2','EE_3'],SI:['SI_1','SI_2','SI_3'],
    FC:['FC_1','FC_2','FC_3'],HM:['HM_1','HM_2','HM_3'],HB:['HB_1','HB_2','HB_3'],BI:['BI_1','BI_2','BI_3']};
  const utaut2 = Object.fromEntries(
    Object.entries(utaut2Constructs).map(([k,c])=>[k,mean(getVals(results,c))?.toFixed(2)])
  );

  const susItems = results.filter(r=>r.code.startsWith('SUS_')&&r.selectedValue);
  const sus = susItems.length === 10 ? (() => {
    const s = susItems.reduce((t,r)=>{
      const v=Number(r.selectedValue);
      return t+(r.polarity==='pos'?v-1:5-v);
    },0)*2.5;
    return { score:s.toFixed(1), grade:s>=85?'Excellent (A)':s>=70?'Acceptable (C)':'Poor (F)', n:susItems.length };
  })() : null;

  const zbiItems = results.filter(r=>r.code.startsWith('ZBI_')&&r.selectedValue);
  const zbiTotal = zbiItems.reduce((s,r)=>s+Number(r.selectedValue),0);
  const zbi = zbiItems.length ? {
    total:zbiTotal,n:zbiItems.length,
    category:zbiTotal<=20?'Little/No burden (0–20)':zbiTotal<=40?'Mild-Moderate (21–40)':
      zbiTotal<=60?'Moderate-Severe (41–60)':'Severe burden (61–88)'
  } : null;

  const tuqItems = results.filter(r=>r.code.startsWith('TUQ_')&&r.selectedValue);
  const tuqMean  = mean(tuqItems.map(r=>Number(r.selectedValue)));
  const tuq = tuqItems.length ? {
    mean:tuqMean?.toFixed(2), n:tuqItems.length,
    grade:tuqMean>=3.5?'Acceptable (≥3.5)':'Below threshold'
  } : null;

  const mastDomains = {D1:['MAST_D1_1','MAST_D1_2','MAST_D1_3','MAST_D1_4'],
    D2:['MAST_D2_1','MAST_D2_2','MAST_D2_3','MAST_D2_4'],
    D3:['MAST_D3_1','MAST_D3_2','MAST_D3_3','MAST_D3_4','MAST_D3_5'],
    D4:['MAST_D4_1','MAST_D4_2','MAST_D4_3','MAST_D4_4'],
    D5:['MAST_D5_1','MAST_D5_2','MAST_D5_3','MAST_D5_4'],
    D6:['MAST_D6_1','MAST_D6_2','MAST_D6_3','MAST_D6_4'],
    D7:['MAST_D7_1','MAST_D7_2','MAST_D7_3']};
  const mast = Object.fromEntries(
    Object.entries(mastDomains).map(([k,c])=>[k,mean(getVals(results,c))?.toFixed(2)])
  );

  // WHOQOL-BREF scoring
  // Negatively-worded items (Q3, Q4, Q26): reversed = 6 − raw
  // Domain score (0–100) = (mean_of_domain_items − 1) × 25
  const whoqolItems = results.filter(r => r.code.startsWith('WHOQ_') && r.selectedValue);
  let whoqol = null;
  if (whoqolItems.length > 0) {
    const getScore = code => {
      const item = whoqolItems.find(r => r.code === code);
      if (!item) return null;
      const raw = Number(item.selectedValue);
      return item.neg ? 6 - raw : raw;
    };
    const domainMean = codes => {
      const vals = codes.map(getScore).filter(v => v !== null);
      return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    };
    const toScore = mean => mean !== null ? ((mean - 1) * 25).toFixed(1) : null;
    const physMean  = domainMean(['WHOQ_3','WHOQ_4','WHOQ_10','WHOQ_15','WHOQ_16','WHOQ_17','WHOQ_18']);
    const psychMean = domainMean(['WHOQ_5','WHOQ_6','WHOQ_7','WHOQ_11','WHOQ_19','WHOQ_26']);
    const socMean   = domainMean(['WHOQ_20','WHOQ_21','WHOQ_22']);
    const envMean   = domainMean(['WHOQ_8','WHOQ_9','WHOQ_12','WHOQ_13','WHOQ_14','WHOQ_23','WHOQ_24','WHOQ_25']);
    const globalMean= domainMean(['WHOQ_1','WHOQ_2']);
    whoqol = {
      global:      toScore(globalMean),
      physical:    toScore(physMean),
      psychological: toScore(psychMean),
      social:      toScore(socMean),
      environmental: toScore(envMean),
      n: whoqolItems.length,
      threshold: '≥10% change at 12 weeks',
    };
  }

  return { tam, utaut2, sus, zbi, tuq, mast, whoqol };
}

function resultsToCSV(results, pid, sheetKey, ts) {
  const hdr = ['participant_id','sheet','timestamp','page','section','code','label','response','ambiguous','confidence'];

// OpenCV perspective warp
function sortCorners(pts) {
  const cx = pts.reduce((s,p)=>s+p.x,0)/4, cy = pts.reduce((s,p)=>s+p.y,0)/4;
  const q = p => (p.x<cx?0:1)*2 + (p.y<cy?0:1); // TL=0,TR=2,BR=3,BL=1
  const tl = pts.find(p=>p.x<cx&&p.y<cy)||pts[0];
  const tr = pts.find(p=>p.x>cx&&p.y<cy)||pts[1];
  const br = pts.find(p=>p.x>cx&&p.y>cy)||pts[2];
  const bl = pts.find(p=>p.x<cx&&p.y>cy)||pts[3];
  return [tl,tr,br,bl];
}

function detectAndWarp(srcCanvas) {
  if (!window.cv) return srcCanvas;
  try {
    const src = cv.imread(srcCanvas);
    const gray = new cv.Mat(), blurred = new cv.Mat(), edges = new cv.Mat(), dilated = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, blurred, new cv.Size(9,9), 0);
    cv.Canny(blurred, edges, 30, 100);
    const kernel = cv.Mat.ones(5,5,cv.CV_8U);
    cv.dilate(edges, dilated, kernel);
    const contours = new cv.MatVector(), hier = new cv.Mat();
    cv.findContours(dilated, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let maxArea = 0, bestApprox = null;
    const minArea = srcCanvas.width * srcCanvas.height * 0.15;
    for (let i = 0; i < contours.size(); i++) {
      const c = contours.get(i), area = cv.contourArea(c);
      if (area < minArea) continue;
      const approx = new cv.Mat();
      cv.approxPolyDP(c, approx, 0.02*cv.arcLength(c,true), true);
      if (approx.rows === 4 && area > maxArea) {
        if (bestApprox) bestApprox.delete();
        bestApprox = approx; maxArea = area;
      } else approx.delete();
    }

    let result = srcCanvas;
    if (bestApprox) {
      const pts = Array.from({length:4},(_,i)=>({x:bestApprox.data32S[i*2],y:bestApprox.data32S[i*2+1]}));
      const sorted = sortCorners(pts);
      const dstW=2339, dstH=1654;
      const srcPts = cv.matFromArray(4,1,cv.CV_32FC2, sorted.flatMap(p=>[p.x,p.y]));
      const dstPts = cv.matFromArray(4,1,cv.CV_32FC2, [0,0, dstW,0, dstW,dstH, 0,dstH]);
      const M = cv.getPerspectiveTransform(srcPts, dstPts);
      const dst = new cv.Mat();
      cv.warpPerspective(src, dst, M, new cv.Size(dstW,dstH));
      const out = document.createElement('canvas');
      out.width=dstW; out.height=dstH;
      cv.imshow(out, dst);
      result = out;
      [srcPts,dstPts,M,dst,bestApprox].forEach(m=>{try{m.delete()}catch(e){}});
    }
    [src,gray,blurred,edges,dilated,kernel,contours,hier].forEach(m=>{try{m.delete()}catch(e){}});
    return result;
  } catch(err) {
    console.error('Warp failed:', err);
    return srcCanvas;
  }
}

function OverlayCanvas({ grayCanvas, pageResults, scale }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !grayCanvas || !pageResults.length) return;
    const c = ref.current, ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);
    const sx = c.width/PAGE_W, sy = c.height/PAGE_H, r = BR*sx;
    pageResults.forEach(item => {
      item.bubble_xs.forEach((bx, bi) => {
        const cx = bx*sx, cy = item.y_mm*sy;
        const sel = item.selectedIndex === bi;
        const fill = item.fills?.[bi] || 0;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI);
        ctx.fillStyle = sel
          ? (item.ambiguous ? 'rgba(245,124,0,0.75)' : 'rgba(46,125,50,0.75)')
          : fill > 0.15 ? 'rgba(198,40,40,0.3)' : 'rgba(30,100,180,0.1)';
        ctx.fill();
        ctx.strokeStyle = sel ? (item.ambiguous ? C.amber : C.green) : 'rgba(30,100,180,0.45)';
        ctx.lineWidth = sel ? 2 : 1; ctx.stroke();
      });
      // item code label
      ctx.fillStyle='rgba(27,58,107,0.65)';
      ctx.font=`${Math.round(3.2*sy)}px monospace`;
      ctx.fillText(item.code, 2, item.y_mm*sy + 1.5*sy);
    });
  }, [grayCanvas, pageResults, scale]);
  const w=Math.round(PAGE_W*scale), h=Math.round(PAGE_H*scale);
  return <canvas ref={ref} width={w} height={h}
    style={{position:'absolute',top:0,left:0,pointerEvents:'none'}}/>;
}

  const u2vals = utaut2 ? Object.entries(utaut2).filter(([,v])=>v) : [];
  if (u2vals.length) cards.push({ title:'UTAUT2', color:'#5C6BC0',

  if (tuq) cards.push({ title:'TUQ',color:tuq.mean>=3.5?C.green:C.amber,

  const mastVals = mast ? Object.entries(mast).filter(([,v])=>v) : [];

  const { whoqol } = scores;

      ['Environmental',  whoqol.environmental],

    cards.push({ title:'WHOQOL-BREF', color:'#00796B', rows:[
      ['Global QoL',      (whoqol.global      ?? '—')+'/100'],

        <div key={card.title} style={{border:`2px solid ${card.color}`,borderRadius:8,
          minWidth:160,flex:'1 1 160px',overflow:'hidden'}}>
          <div style={{background:card.color,color:'#fff',padding:'4px 10px',
            fontWeight:700,fontSize:12}}>{card.title}</div>

              borderBottom:`1px solid ${C.lgrey}`,fontSize:11}}>

function App() {
  // [v2] M4 — Pre-select sheet from URL query param: omr_scanner_v2.html?sheet=ALLIED_HEALTH
  const _urlSheet = (() => {
    try {
      const p = new URLSearchParams(window.location.search).get('sheet');
      return (p && SHEET_CONFIGS[p]) ? p : 'CAREGIVER';
    } catch(e) { return 'CAREGIVER'; }
  })();
  const [sheetKey,  setSheetKey]  = useState(_urlSheet);
  const [pid,       setPid]       = useState('');
  const [pages,     setPages]     = useState({});
  const [curPage,   setCurPage]   = useState(1);
  const [results,   setResults]   = useState([]);
  const [scores,    setScores]    = useState({});
  const [calib,     setCalib]     = useState({});
  const [cvReady,   setCvReady]   = useState(false);
  const [processing,setProcessing]= useState(false);
  const [showCalib, setShowCalib] = useState(false);
  const [autoWarp,  setAutoWarp]  = useState(true);
  const [camStream, setCamStream] = useState(null);
  const [camPage,   setCamPage]   = useState(null);
  const fileRefs = useRef({});
  const videoRef = useRef(null);

  useEffect(()=>{
    const t=setInterval(()=>{ if(window.cvReady){setCvReady(true);clearInterval(t);} },400);
    return ()=>clearInterval(t);
  },[]);

  const sheet    = SHEET_CONFIGS[sheetKey];
  const allItems = getAllItems(sheetKey);

  const loadPage = useCallback((pageNum, file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const raw = document.createElement('canvas');
        raw.width=img.naturalWidth; raw.height=img.naturalHeight;
        raw.getContext('2d').drawImage(img,0,0);
        const corrected = (cvReady&&autoWarp) ? detectAndWarp(raw) : raw;
        setPages(p=>({...p,[pageNum]:{corrected,gray:toGrayscaleCanvas(corrected)}}));
        setCurPage(pageNum);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  },[cvReady,autoWarp]);

  const openCamera = async (pn) => {
    setCamPage(pn);
    try {
      const s = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment',width:{ideal:2560},height:{ideal:1920}}});
      setCamStream(s);
      setTimeout(()=>{ if(videoRef.current) videoRef.current.srcObject=s; },120);
    } catch(e) { alert('Camera error: '+e.message); setCamPage(null); }
  };

  const captureCamera = () => {
    if (!videoRef.current||camPage===null) return;
    const v=videoRef.current, c=document.createElement('canvas');
    c.width=v.videoWidth; c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    c.toBlob(b=>{ loadPage(camPage,b); closeCamera(); },'image/jpeg',0.95);
  };

  const closeCamera = () => {
    if(camStream) camStream.getTracks().forEach(t=>t.stop());
    setCamStream(null); setCamPage(null);
  };

  const processAll = () => {
    setProcessing(true);
    setTimeout(()=>{
      const res=[];
      for(let p=1;p<=sheet.pages;p++){
        if(!pages[p]?.gray) continue;
        res.push(...processPage(pages[p].gray, allItems, p, calib));
      }
      setResults(res);
      setScores(computeScores(res));
      setProcessing(false);
    },50);
  };

  const handleOverride = (code, val) => {
    setResults(prev=>{
      const next=prev.map(r=>r.code===code
        ?{...r,selectedValue:val,no_response:val===null,ambiguous:false}:r);
      setScores(computeScores(next));
      return next;
    });
  };

  const exportCSV=()=>{
    const ts=new Date().toISOString().slice(0,19).replace(/[:-]/g,'');
    downloadBlob(resultsToCSV(results,pid||'UNKNOWN',sheetKey,ts),
      `omr_${sheetKey}_${pid||'UNKNOWN'}_${ts}.csv`,'text/csv');
  };

  const exportJSON=()=>{
    const ts=new Date().toISOString();
    downloadBlob(JSON.stringify({participant_id:pid,sheet:sheetKey,timestamp:ts,scores,results},null,2),
      `omr_${sheetKey}_${pid||'UNKNOWN'}_${ts.slice(0,10)}.json`,'application/json');
  };

  const pageResults  = results.filter(r=>r.page===curPage);
  const totalLoaded  = Object.keys(pages).length;
  const totalMissing = results.filter(r=>r.no_response).length;
  const totalAmbig   = results.filter(r=>r.ambiguous).length;
  const allPagesLoaded = totalLoaded>=sheet.pages;

  return (
    <div style={{fontFamily:'Segoe UI,Arial,sans-serif',minHeight:'100vh',background:'#f0f4f8'}}>

      {/* Header */}
      <div style={{background:C.navy,color:'#fff',padding:'10px 20px',
        display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
        <div>
          <div style={{fontWeight:800,fontSize:15,letterSpacing:.5}}>DTAM-MY OMR SCANNER</div>
          <div style={{fontSize:10,color:'#9ab',marginTop:1}}>
            Telerehabilitation Research · UTAR 24UED03838 · All processing is local
          </div>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center',marginLeft:'auto',flexWrap:'wrap'}}>
          <span style={{fontSize:11,color:'#9ab'}}>OpenCV:</span>
          <span style={{fontSize:11,padding:'2px 8px',borderRadius:10,
            background:cvReady?C.green:'#777',color:'#fff'}}>
            {cvReady?'✓ Ready':'Loading…'}
          </span>
          {results.length>0 && <>
            <button onClick={exportCSV} style={btnStyle(C.teal,'#fff')}>⬇ CSV</button>
            <button onClick={exportJSON} style={btnStyle(C.lnavy,C.navy)}>⬇ JSON</button>
          </>}
        </div>
      </div>

      <div style={{maxWidth:1150,margin:'0 auto',padding:'14px 12px'}}>

        {/* Config row */}
        <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div>
            <div style={LBL}>Questionnaire Type</div>
            <select value={sheetKey}
              onChange={e=>{setSheetKey(e.target.value);setResults([]);setPages({});setScores({});}}
              style={SEL}>
              {Object.entries(SHEET_CONFIGS).map(([k,v])=>(
                <option key={k} value={k}>[{v.code}] {v.name}</option>))}
            </select>
          </div>
          <div>
            <div style={LBL}>Participant ID</div>
            <input value={pid} onChange={e=>setPid(e.target.value)}
              placeholder='e.g. CG-001' style={{...SEL,width:120}}/>
          </div>
          <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,
            color:C.navy,paddingBottom:3,cursor:'pointer'}}>
            <input type='checkbox' checked={autoWarp} onChange={e=>setAutoWarp(e.target.checked)}/>
            Auto perspective-correct
          </label>
          <div style={{marginLeft:'auto',display:'flex',gap:6}}>
            <button onClick={()=>setShowCalib(v=>!v)}
              style={btnStyle(C.lgrey,C.navy)}>
              🎯 {showCalib?'Hide':'Show'} Calibration
            </button>
            <button onClick={processAll}
              disabled={totalLoaded===0||processing}
              style={btnStyle(processing?'#888':C.orange,'#fff',{padding:'5px 16px'})}>
              {processing?'⏳ Processing…':`⚡ Process (${totalLoaded}/${sheet.pages} pages loaded)`}
            </button>
          </div>
        </div>

        {/* Calibration panel */}
        {showCalib && (
          <CalibPanel sections={sheet.sections} calibration={calib}
            onChange={(id,v)=>setCalib(c=>({...c,[id]:v}))}/>
        )}

        {/* Page tabs */}
        <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
          {Array.from({length:sheet.pages},(_,i)=>i+1).map(p=>(
            <div key={p} style={{display:'flex',gap:3,alignItems:'center'}}>
              <button onClick={()=>setCurPage(p)} style={{
                ...btnStyle(curPage===p?C.teal:C.lnavy,curPage===p?'#fff':C.navy),
                outline:pages[p]?`2px solid ${C.green}`:'none',outlineOffset:1}}>
                Page {p} {pages[p]?'✓':'—'}
              </button>
              <input ref={el=>fileRefs.current[p]=el} type='file' accept='image/*'
                style={{display:'none'}} onChange={e=>loadPage(p,e.target.files[0])}/>
              <button title='Upload scan' onClick={()=>fileRefs.current[p]?.click()}
                style={btnStyle(C.lgrey,C.navy,{padding:'5px 8px'})}>📁</button>
              <button title='Capture photo' onClick={()=>openCamera(p)}
                style={btnStyle(C.lgrey,C.navy,{padding:'5px 8px'})}>📷</button>
            </div>
          ))}
        </div>

        {/* Camera modal */}
        {camStream && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',zIndex:999,
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}>
            <div style={{color:'#fff',fontWeight:700,fontSize:15}}>
              📷 Page {camPage} — hold sheet flat, good lighting
            </div>
            <video ref={videoRef} autoPlay playsInline
              style={{maxWidth:'90vw',maxHeight:'60vh',border:`3px solid ${C.teal}`,borderRadius:8}}/>
            <div style={{display:'flex',gap:10}}>
              <button onClick={captureCamera}
                style={btnStyle(C.teal,'#fff',{fontSize:15,padding:'10px 26px'})}>
                📸 Capture
              </button>
              <button onClick={closeCamera}
                style={btnStyle('#666','#fff',{padding:'10px 18px'})}>Cancel</button>
            </div>
          </div>
        )}

        {/* Main two-column layout */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,alignItems:'start'}}>

          {/* Left: image viewer */}
          <div>
            <div style={{fontWeight:700,color:C.navy,fontSize:13,marginBottom:6,
              display:'flex',justifyContent:'space-between'}}>
              <span>Page {curPage}
                <span style={{fontWeight:400,color:'#888',fontSize:11,marginLeft:6}}>
                  ({allItems.filter(i=>i.page===curPage).length} items)
                </span>
              </span>
              {pages[curPage] && (
                <span style={{fontSize:11,color:C.green,fontWeight:600}}>✓ Loaded</span>
              )}
            </div>
            {pages[curPage]?.gray ? (
              <PageViewer grayCanvas={pages[curPage].gray} pageResults={pageResults}/>
            ) : (
              <div style={{border:`2px dashed ${C.lnavy}`,borderRadius:8,padding:'36px 20px',
                textAlign:'center',color:'#aaa',background:'#fafbfc'}}>
                <div style={{fontSize:36}}>🖼️</div>
                <div style={{marginTop:8,fontSize:13}}>Upload a scan or capture with camera</div>
                <div style={{fontSize:11,marginTop:4,color:'#bbb'}}>A4 landscape · ≥150 DPI · JPEG or PNG</div>
                <div style={{marginTop:14,display:'flex',gap:8,justifyContent:'center'}}>
                  <button onClick={()=>fileRefs.current[curPage]?.click()}
                    style={btnStyle(C.teal,'#fff')}>📁 Upload</button>
                  <button onClick={()=>openCamera(curPage)}
                    style={btnStyle(C.navy,'#fff')}>📷 Camera</button>
                </div>
              </div>
            )}
          </div>

          {/* Right: results */}
          <div>
            {results.length>0 ? (<>
              <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
                <Badge color={C.teal}>{results.length} items</Badge>
                {totalMissing>0 && <Badge color={C.red}>{totalMissing} missing</Badge>}
                {totalAmbig>0  && <Badge color={C.amber}>{totalAmbig} ambiguous</Badge>}
                <div style={{marginLeft:'auto',display:'flex',gap:4}}>
                  {Array.from({length:sheet.pages},(_,i)=>i+1).map(p=>(
                    <button key={p} onClick={()=>setCurPage(p)}
                      style={btnStyle(curPage===p?C.navy:C.lgrey,curPage===p?'#fff':C.navy)}>
                      Pg {p}
                    </button>
                  ))}
                </div>
              </div>
              <ScoresSummary scores={scores}/>
              <ResultsTable results={pageResults} onOverride={handleOverride}/>
            </>) : (
              <div style={{border:`2px dashed ${C.lnavy}`,borderRadius:8,padding:'36px 20px',
                textAlign:'center',color:'#aaa',background:'#fafbfc'}}>
                <div style={{fontSize:36}}>📊</div>
                <div style={{marginTop:8,fontSize:13}}>Results appear here after processing</div>
                <div style={{fontSize:11,marginTop:4,color:'#bbb'}}>
                  Upload {sheet.pages} page(s) then click ⚡ Process
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Instructions */}
        <details style={{marginTop:16,border:`1px solid ${C.lnavy}`,borderRadius:8,overflow:'hidden'}}>
          <summary style={{background:C.lnavy,padding:'7px 14px',cursor:'pointer',
            fontWeight:700,color:C.navy,fontSize:12}}>
            ℹ️ Instructions &amp; Scoring Thresholds
          </summary>
          <div style={{padding:14,fontSize:12,lineHeight:1.8,color:'#444',
            display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <ol style={{paddingLeft:18}}>
              <li>Select <strong>questionnaire type</strong> and enter participant ID.</li>
              <li>Upload scanned pages (📁) or photograph with camera (📷) — one per page tab.</li>
              <li>For camera shots, enable <em>Auto perspective-correct</em> (needs OpenCV).</li>
              <li>Click <strong>⚡ Process</strong> to extract all responses.</li>
              <li>Overlay: <span style={{color:C.green}}>green</span> = filled · <span style={{color:C.amber}}>orange</span> = ambiguous · grey = empty.</li>
              <li>Use <strong>Fix</strong> dropdowns to correct any misread items.</li>
              <li>If rows are misaligned, open <strong>🎯 Calibration</strong> and adjust ΔY per section.</li>
              <li>Export <strong>CSV</strong> or <strong>JSON</strong> for data entry / analysis.</li>
            </ol>
            <div>
              <div style={{fontWeight:700,color:C.navy,marginBottom:6}}>Scoring Thresholds</div>
              {[
                ['TAM / UTAUT2','Mean ≥3.5/5 = acceptable adoption intent'],
                ['TUQ','Mean ≥3.5/5 = acceptable usability'],
                ['SUS','≥70 = Acceptable · ≥85 = Excellent'],
                ['ZBI','0–20 minimal · 21–40 mild · 41–60 moderate · 61–88 severe'],
                ['MAST','Domain mean ≥3.5/5 = recommended for deployment'],
                ['WHOQOL-BREF','Domain score 0–100 · ≥10% improvement at 12 wks = target · Q3,Q4,Q26 reverse-scored'],
                ['Detection threshold','Fill ratio ≥28% = marked response'],
              ].map(([k,v])=>(
                <div key={k} style={{marginBottom:4}}>
                  <strong style={{color:C.teal}}>{k}:</strong> {v}
                </div>
              ))}
            </div>
          </div>
        </details>

        <div style={{textAlign:'center',marginTop:12,fontSize:10,color:'#bbb'}}>
          DTAM-MY OMR Scanner v1.0 · UTAR PhD Research · All data processed locally in-browser
        </div>
      </div>
    </div>
  );
}

const LBL = { fontSize:11,color:'#666',marginBottom:3,fontWeight:600 };
const SEL = { padding:'5px 8px',border:`1px solid #ccc`,borderRadius:5,fontSize:13,background:'#fff' };

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
