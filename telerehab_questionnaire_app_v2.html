<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://your-backend.dtammy.utar.edu.my; img-src 'self' data: blob:; media-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>DTAM-MY v2 | Telerehabilitation Research Questionnaire Suite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --navy: #1B3A6B; --teal: #0E8B8B; --lteal: #D6F0F0; --lnavy: #D8E4F0;
    --lgrey: #F2F5F8; --orange: #E07B39; --white: #ffffff;
    --text: #1a1a2e; --muted: #6b7280; --danger: #dc2626; --success: #16a34a;
    /* Fluid type scale */
    --fs-xs:  clamp(10px, 1.8vw, 11px);
    --fs-sm:  clamp(12px, 2vw,   13px);
    --fs-base:clamp(13px, 2.2vw, 14px);
    --fs-md:  clamp(14px, 2.5vw, 16px);
    --fs-lg:  clamp(16px, 3vw,   18px);
    --fs-xl:  clamp(18px, 4vw,   24px);
    --fs-2xl: clamp(20px, 5vw,   26px);
    /* Touch target */
    --touch: 44px;
    /* Safe area insets (iPhone notch/Dynamic Island) */
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left:   env(safe-area-inset-left, 0px);
    --safe-right:  env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--lgrey); color: var(--text); min-height: 100vh; font-size: var(--fs-base); -webkit-text-size-adjust: 100%; }
  #root { min-height: 100vh; }

  /* Layout */
  .app-header {
    background: var(--navy); color: white;
    padding: calc(12px + var(--safe-top)) calc(24px + var(--safe-right)) 12px calc(24px + var(--safe-left));
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    gap: 12px;
  }
  .app-header .logo { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .app-header .logo-icon { width: 36px; height: 36px; flex-shrink: 0; background: var(--teal); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; }
  .app-header .logo-text { min-width: 0; }
  .app-header .logo-title { font-size: var(--fs-sm); font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .app-header h1 { font-size: var(--fs-sm); font-weight: 700; line-height: 1.2; }
  .app-header .subtitle { font-size: var(--fs-xs); opacity: 0.7; }
  .lang-btn {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer;
    font-size: var(--fs-xs); font-weight: 600; transition: background 0.2s;
    min-height: var(--touch); min-width: var(--touch);
    display: flex; align-items: center; justify-content: center;
  }
  .lang-btn:hover, .lang-btn.active { background: var(--teal); }
  .lang-pills { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }

  .container { max-width: 860px; margin: 0 auto; padding: 20px max(16px, calc(16px + var(--safe-left))) calc(20px + var(--safe-bottom)); }

  /* Cards */
  .card { background: white; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); padding: clamp(16px, 4vw, 28px); margin-bottom: 20px; }
  .card-title { font-size: var(--fs-lg); font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .card-desc { color: var(--muted); font-size: var(--fs-base); line-height: 1.6; }

  /* Landing */
  .hero { background: linear-gradient(135deg, var(--navy) 0%, #2a5298 100%); color: white; border-radius: 16px; padding: clamp(24px, 6vw, 40px) clamp(20px, 5vw, 32px); margin-bottom: 24px; text-align: center; }
  .hero h2 { font-size: var(--fs-2xl); font-weight: 800; margin-bottom: 8px; line-height: 1.25; }
  .hero p { opacity: 0.85; font-size: var(--fs-md); line-height: 1.6; max-width: 560px; margin: 0 auto; }
  .hero .badges { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
  .badge { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 4px 12px; font-size: var(--fs-xs); font-weight: 600; }

  /* Group selector */
  .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(240px, 100%), 1fr)); gap: 14px; margin-top: 16px; }
  .group-card { border: 2px solid #e5e7eb; border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; background: white; text-align: left; min-height: var(--touch); }
  .group-card:hover { border-color: var(--teal); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(14,139,139,0.15); }
  .group-card.selected { border-color: var(--teal); background: var(--lteal); }
  .group-card .icon { font-size: 28px; margin-bottom: 10px; }
  .group-card h3 { font-size: var(--fs-base); font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .group-card p { font-size: var(--fs-sm); color: var(--muted); line-height: 1.4; }
  .group-card .instruments { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
  .instr-tag { background: var(--lnavy); color: var(--navy); border-radius: 4px; padding: 2px 6px; font-size: var(--fs-xs); font-weight: 600; }

  /* Progress */
  .progress-bar-wrap { background: #e5e7eb; border-radius: 99px; height: 8px; margin: 16px 0; overflow: hidden; }
  .progress-bar { background: linear-gradient(90deg, var(--teal), #2dd4bf); height: 100%; border-radius: 99px; transition: width 0.4s ease; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Section header */
  .section-header { background: linear-gradient(135deg, var(--navy), #2a5298); color: white; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; }
  .section-header h3 { font-size: var(--fs-md); font-weight: 700; }
  .section-header p { font-size: var(--fs-sm); opacity: 0.8; margin-top: 4px; }
  .section-source { font-size: var(--fs-xs); background: rgba(255,255,255,0.15); border-radius: 4px; padding: 2px 8px; display: inline-block; margin-top: 6px; }

  /* Question */
  .question-block { border: 1px solid #e5e7eb; border-radius: 10px; padding: clamp(14px, 3vw, 18px); margin-bottom: 14px; transition: border-color 0.2s; background: white; }
  .question-block:hover { border-color: var(--teal); }
  .question-block.answered { border-left: 4px solid var(--teal); }
  .question-block.warning { border-left: 4px solid var(--orange); background: #fffbf5; }
  .question-num { font-size: var(--fs-xs); font-weight: 700; color: var(--teal); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .question-text { font-size: var(--fs-md); font-weight: 500; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
  .question-text .reversed { color: var(--orange); font-size: var(--fs-xs); font-weight: 700; margin-left: 6px; }

  /* Helper */
  .helper-btn {
    background: none; border: 1px solid var(--teal); color: var(--teal);
    border-radius: 4px; padding: 4px 10px; font-size: var(--fs-xs);
    cursor: pointer; margin-left: 8px; transition: all 0.2s;
    min-height: 32px; display: inline-flex; align-items: center;
    vertical-align: middle;
  }
  .helper-btn:hover { background: var(--lteal); }
  .helper-box { background: var(--lteal); border-left: 3px solid var(--teal); border-radius: 6px; padding: 10px 14px; font-size: var(--fs-base); color: #065f46; line-height: 1.6; margin-bottom: 10px; }

  /* Likert scale */
  .likert-wrap { display: flex; gap: 6px; align-items: flex-start; justify-content: space-between; }
  .likert-labels { display: flex; justify-content: space-between; font-size: var(--fs-xs); color: var(--muted); margin-bottom: 6px; }
  .likert-option { flex: 1; min-width: 0; }
  .likert-option input { display: none; }
  .likert-option label { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 4px 2px; }
  .likert-option label .bubble {
    width: var(--touch); height: var(--touch);
    border-radius: 50%; border: 2px solid #d1d5db; background: white;
    display: flex; align-items: center; justify-content: center;
    font-size: var(--fs-base); font-weight: 700; color: var(--muted);
    transition: all 0.2s; flex-shrink: 0;
  }
  .likert-option label .lbl { font-size: var(--fs-xs); color: var(--muted); text-align: center; line-height: 1.3; word-break: break-word; hyphens: auto; max-width: 56px; }
  .likert-option input:checked + label .bubble { background: var(--teal); border-color: var(--teal); color: white; transform: scale(1.08); box-shadow: 0 0 0 3px rgba(14,139,139,0.2); }
  .likert-option input:checked + label .lbl { color: var(--teal); font-weight: 600; }

  /* Text input */
  .text-input { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 12px 14px; font-size: var(--fs-md); transition: border-color 0.2s; resize: vertical; font-family: inherit; min-height: var(--touch); }
  .text-input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(14,139,139,0.1); }

  /* Select */
  .select-input { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 12px 14px; font-size: var(--fs-md); background: white; cursor: pointer; min-height: var(--touch); }
  .select-input:focus { outline: none; border-color: var(--teal); }

  /* Checkbox group */
  .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
  .check-item { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px 12px; border-radius: 8px; border: 1px solid #e5e7eb; transition: all 0.2s; }
  .check-item:hover { border-color: var(--teal); background: var(--lteal); }
  .check-item input { width: 16px; height: 16px; accent-color: var(--teal); }
  .check-item label { font-size: 14px; cursor: pointer; }

  /* Radio group */
  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-item { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px 12px; border-radius: 8px; border: 1px solid #e5e7eb; transition: all 0.2s; }
  .radio-item:hover { border-color: var(--teal); background: var(--lteal); }
  .radio-item.selected { border-color: var(--teal); background: var(--lteal); }
  .radio-item input { width: 16px; height: 16px; accent-color: var(--teal); }
  .radio-item label { font-size: 14px; cursor: pointer; }

  /* Quality warning */
  .quality-alert { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #92400e; display: flex; align-items: flex-start; gap: 10px; margin-bottom: 16px; }
  .quality-alert .icon { font-size: 18px; flex-shrink: 0; }

  /* Navigation */
  .nav-btns { display: flex; gap: 12px; justify-content: space-between; align-items: center; margin-top: 24px; flex-wrap: wrap; }
  .btn {
    padding: 12px 24px; border-radius: 8px; font-size: var(--fs-base); font-weight: 600;
    cursor: pointer; border: none; transition: all 0.2s;
    min-height: var(--touch); display: inline-flex; align-items: center; justify-content: center;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--teal); color: white; }
  .btn-primary:hover { background: #0a7070; transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary { background: white; color: var(--navy); border: 1px solid #d1d5db; }
  .btn-secondary:hover { border-color: var(--teal); color: var(--teal); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-lg { padding: 14px 32px; font-size: var(--fs-md); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Consent */
  .consent-box { background: var(--lgrey); border-radius: 8px; padding: 20px; margin: 16px 0; max-height: 300px; overflow-y: auto; font-size: var(--fs-base); line-height: 1.7; color: var(--text); border: 1px solid #d1d5db; -webkit-overflow-scrolling: touch; }
  .consent-check { display: flex; align-items: flex-start; gap: 12px; margin-top: 16px; padding: 14px; background: var(--lteal); border-radius: 8px; cursor: pointer; }
  .consent-check input { width: 22px; height: 22px; margin-top: 2px; flex-shrink: 0; accent-color: var(--teal); cursor: pointer; }
  .consent-check label { font-size: var(--fs-base); font-weight: 500; color: var(--navy); cursor: pointer; line-height: 1.6; }

  /* Report */
  .report-header { background: linear-gradient(135deg, var(--navy), #2a5298); color: white; border-radius: 14px; padding: clamp(20px, 5vw, 32px); text-align: center; margin-bottom: 24px; }
  .report-header h2 { font-size: var(--fs-xl); font-weight: 800; margin-bottom: 8px; }
  .report-header p { opacity: 0.85; font-size: var(--fs-base); }
  .score-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(180px, 100%), 1fr)); gap: 14px; margin-bottom: 24px; }
  .score-card { background: white; border-radius: 10px; padding: 18px; border: 1px solid #e5e7eb; text-align: center; }
  .score-card .score-val { font-size: clamp(24px, 6vw, 32px); font-weight: 800; margin-bottom: 4px; }
  .score-card .score-label { font-size: var(--fs-sm); color: var(--muted); font-weight: 600; }
  .score-card .score-interp { font-size: var(--fs-xs); margin-top: 6px; padding: 4px 8px; border-radius: 4px; font-weight: 600; }
  .score-card .good { background: #dcfce7; color: var(--success); }
  .score-card .moderate { background: #fef3c7; color: #92400e; }
  .score-card .poor { background: #fee2e2; color: var(--danger); }
  .domain-bar { margin-bottom: 12px; }
  .domain-bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .domain-bar-track { background: #e5e7eb; border-radius: 99px; height: 10px; overflow: hidden; }
  .domain-bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }

  /* Demographic grid */
  .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-label { font-size: var(--fs-sm); font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  .field-required { color: var(--danger); margin-left: 2px; }

  /* Print */
  @media print {
    .app-header, .nav-btns, .btn, .helper-btn { display: none !important; }
    .card { box-shadow: none; border: 1px solid #ccc; }
    body { background: white; }
  }

  /* ─── RESPONSIVE BREAKPOINTS ─────────────────────────────────── */

  /* Tablet portrait and below (≤768px) */
  @media (max-width: 768px) {
    .container { padding: 16px max(12px, calc(12px + var(--safe-left))); }
    .card { padding: 18px; }
    .demo-grid { grid-template-columns: 1fr 1fr; }
    .score-grid { grid-template-columns: 1fr 1fr; }
    /* Progress labels: hide the section-by-section strip, show only current */
    .progress-section-strip { display: none; }
    .progress-section-current { display: block !important; }
  }

  /* Phone landscape + small tablets (≤600px) */
  @media (max-width: 600px) {
    .app-header { padding: calc(10px + var(--safe-top)) calc(16px + var(--safe-right)) 10px calc(16px + var(--safe-left)); gap: 8px; }
    .app-header .logo-icon { width: 30px; height: 30px; font-size: 13px; }
    .lang-btn { padding: 5px 9px; min-height: 38px; min-width: 38px; }
    .container { padding: 14px 12px; }
    .card { padding: 16px; border-radius: 10px; }
    .hero { padding: 22px 18px; border-radius: 12px; }
    .demo-grid { grid-template-columns: 1fr; }
    .group-grid { grid-template-columns: 1fr; }
    .nav-btns .btn { flex: 1; }
    .section-header { padding: 14px 16px; }
    .consent-box { max-height: 240px; }
  }

  /* Phone portrait (≤480px) — primary elderly use case */
  @media (max-width: 480px) {
    .container { padding: 12px 10px; }
    .card { padding: 14px; border-radius: 8px; margin-bottom: 14px; }
    /* Larger Likert bubbles for reduced fine-motor control */
    .likert-option label .bubble { width: 48px; height: 48px; font-size: 15px; }
    .likert-wrap { gap: 4px; }
    .likert-option label .lbl { font-size: 10px; max-width: 46px; }
    /* Larger form inputs for easier tapping */
    .select-input, .text-input { padding: 14px; min-height: 52px; font-size: 16px; /* prevents iOS auto-zoom */ }
    .btn { min-height: 52px; font-size: 15px; }
    .btn-lg { padding: 16px 24px; }
    /* Consent checkbox bigger for arthritic fingers */
    .consent-check input { width: 26px; height: 26px; }
    /* Score grid single column on tiny screens */
    .score-grid { grid-template-columns: 1fr; }
    /* Group cards more compact */
    .group-card { padding: 16px; }
    .group-card .icon { font-size: 24px; margin-bottom: 8px; }
    /* Report table horizontal scroll */
    .report-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    /* Section header tighter */
    .section-header { padding: 12px 14px; }
    /* Progress bar label shorter */
    .progress-label span:first-child { display: none; }
  }

  /* Very small phones (≤360px — common budget Android) */
  @media (max-width: 360px) {
    .lang-pills { gap: 4px; }
    .lang-btn { padding: 4px 7px; font-size: 10px; }
    .likert-option label .bubble { width: 42px; height: 42px; }
    .likert-wrap { gap: 2px; }
  }

  /* Steps indicator */
  .steps { display: flex; align-items: center; gap: 0; margin-bottom: 24px; }
  .step { display: flex; align-items: center; flex: 1; }
  .step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; border: 2px solid #d1d5db; background: white; color: var(--muted); }
  .step-dot.done { background: var(--teal); border-color: var(--teal); color: white; }
  .step-dot.active { background: var(--navy); border-color: var(--navy); color: white; }
  .step-line { flex: 1; height: 2px; background: #d1d5db; }
  .step-line.done { background: var(--teal); }
  .step-name { font-size: 10px; text-align: center; color: var(--muted); margin-top: 4px; }

  /* Tooltip */
  .tooltip-wrap { position: relative; display: inline-block; }
  .tooltip-content { position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: white; font-size: 12px; padding: 8px 12px; border-radius: 6px; width: 200px; line-height: 1.4; z-index: 200; pointer-events: none; }
  .tooltip-content::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #1a1a2e; }

  /* Consent section title */
  .consent-section { font-weight: 700; color: var(--navy); margin-top: 16px; margin-bottom: 6px; font-size: 14px; }
  .consent-body { font-size: 13px; color: #374151; line-height: 1.7; }

  /* Tabs */
  .tab-bar { display: flex; gap: 4px; background: #f3f4f6; padding: 4px; border-radius: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn { flex: 1; padding: 8px 12px; border: none; background: transparent; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.2s; min-width: 80px; }
  .tab-btn.active { background: white; color: var(--navy); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  .divider { border: none; border-top: 1px solid #e5e7eb; margin: 20px 0; }
  .text-center { text-align: center; }
  .text-muted { color: var(--muted); font-size: 13px; }
  .mt-2 { margin-top: 8px; }
  .mt-4 { margin-top: 16px; }
  .flex-center { display: flex; align-items: center; justify-content: center; gap: 10px; }

  /* DTAM-MY Logo */
  .dtam-logo { width:40px; height:40px; border-radius:50%; object-fit:cover; flex-shrink:0; }
  .dtam-logo-lg { width:80px; height:80px; border-radius:50%; object-fit:cover; margin:0 auto 12px; display:block; }
  .team-logo { width:64px; height:64px; border-radius:50%; object-fit:cover; flex-shrink:0; }

  .utar-logo { font-size: var(--fs-xs); color: rgba(255,255,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px; }
  .header-pi-name { font-size: var(--fs-xs); font-weight: 700; color: rgba(255,255,255,0.9); white-space: nowrap; letter-spacing: 0.2px; }

  /* ─── INTRO / LANDING PAGE ───────────────────────────────────── */
  .intro-hero {
    background: linear-gradient(150deg, var(--navy) 0%, #1a4a8a 50%, #0e6b6b 100%);
    color: white; padding: clamp(32px,7vw,64px) clamp(20px,5vw,48px);
    text-align: center; position: relative; overflow: hidden;
  }
  .intro-hero::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .intro-hero-inner { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }

function scoreSurvey(group, answers) {
  const scores = {};

  // SUS score (Brooke, 1996)
  const susKeys = ['sus1','sus2','sus3','sus4','sus5','sus6','sus7','sus8','sus9','sus10'];
  const susReversed = ['sus2','sus4','sus6','sus8','sus10'];
  if (susKeys.every(k => answers[k] != null)) {
    let raw = 0;
    susKeys.forEach(k => {
      const v = parseInt(answers[k]);
      raw += susReversed.includes(k) ? (5 - v) : (v - 1);
    });
    scores.SUS = { value: raw * 2.5, label: 'System Usability Score', max: 100,
      interp: raw*2.5 >= 85 ? 'Excellent' : raw*2.5 >= 70 ? 'Acceptable' : 'Poor',
      color: raw*2.5 >= 85 ? '#16a34a' : raw*2.5 >= 70 ? '#ca8a04' : '#dc2626' };
  }

  // ZBI score (Zarit, 1980) – items scored 0-4
  const zbiKeys = Array.from({length:22}, (_,i) => `zbi${i+1}`);
  if (zbiKeys.every(k => answers[k] != null)) {
    const sum = zbiKeys.reduce((a,k) => a + parseInt(answers[k]), 0);
    scores.ZBI = { value: sum, label: 'Caregiver Burden (ZBI)', max: 88,
      interp: sum <= 20 ? 'Little/No Burden' : sum <= 40 ? 'Mild-Moderate' : sum <= 60 ? 'Moderate-Severe' : 'Severe',
      color: sum <= 20 ? '#16a34a' : sum <= 40 ? '#ca8a04' : '#dc2626' };
  }

  // WHOQOL-BREF domain scores (1-5 scale, some reversed, transform to 0-100)
  const whoDomains = {
    Physical: ['wq3r','wq4r','wq10','wq15','wq16','wq17','wq18'],
    Psychological: ['wq5','wq6','wq7','wq11','wq19','wq26r'],
    Social: ['wq20','wq21','wq22'],
    Environment: ['wq8','wq9','wq12','wq13','wq14','wq23','wq24','wq25'],
  };
  const whoReversed = ['wq3','wq4','wq26'];
  const whoMap = {};
  Object.keys(answers).filter(k => k.startsWith('wq')).forEach(k => {
    const v = parseInt(answers[k]);
    whoMap[k] = whoReversed.includes(k) ? (6 - v) : v;
  });
  Object.entries(whoDomains).forEach(([domain, keys]) => {
    const realKeys = keys.map(k => k.replace('r',''));
    if (realKeys.every(k => whoMap[k] != null)) {
      const mean = realKeys.reduce((a,k) => a + whoMap[k], 0) / realKeys.length;
      const score100 = ((mean - 1) / 4) * 100;
      scores[`WHOQOL_${domain}`] = { value: Math.round(score100), label: `QoL – ${domain}`, max: 100,
        interp: score100 >= 60 ? 'Good' : score100 >= 40 ? 'Moderate' : 'Poor',
        color: score100 >= 60 ? '#16a34a' : score100 >= 40 ? '#ca8a04' : '#dc2626' };
    }
  });

  // TAM scores
  const tamPU = ['tam1','tam2','tam3'], tamPEOU = ['tam4','tam5','tam6'], tamBI = ['tam7'];
  if (tamPU.every(k => answers[k])) {
    const v = tamPU.reduce((a,k) => a + parseInt(answers[k]),0) / tamPU.length;
    scores.TAM_PU = { value: +v.toFixed(1), label: 'Perceived Usefulness', max: 5, interp: v>=4?'High':v>=3?'Moderate':'Low', color: v>=4?'#16a34a':v>=3?'#ca8a04':'#dc2626' };
  }
  if (tamPEOU.every(k => answers[k])) {
    const v = tamPEOU.reduce((a,k) => a + parseInt(answers[k]),0) / tamPEOU.length;
    scores.TAM_PEOU = { value: +v.toFixed(1), label: 'Perceived Ease of Use', max: 5, interp: v>=4?'High':v>=3?'Moderate':'Low', color: v>=4?'#16a34a':v>=3?'#ca8a04':'#dc2626' };
  }

  // UTAUT2 construct scores
  const u2constructs = { PE:['u1','u2'], EE:['u3','u4'], SI:['u5'], FC:['u6','u10'], HM:['u7'], PV:['u8'], HT:['u9'] };
  const u2labels = { PE:'Performance Expectancy', EE:'Effort Expectancy', SI:'Social Influence', FC:'Facilitating Conditions', HM:'Hedonic Motivation', PV:'Price Value', HT:'Habit' };
  Object.entries(u2constructs).forEach(([key, ks]) => {
    if (ks.every(k => answers[k])) {
      const v = ks.reduce((a,k) => a + parseInt(answers[k]),0) / ks.length;
      scores[`U2_${key}`] = { value: +v.toFixed(1), label: u2labels[key], max: 5, interp: v>=4?'High':v>=3?'Moderate':'Low', color: v>=4?'#16a34a':v>=3?'#ca8a04':'#dc2626' };
    }
  });

  // MAST composite
  const mastKeys = Array.from({length:12}, (_,i) => `mast${i+1}`);
  const mastPresent = mastKeys.filter(k => answers[k]);
  if (mastPresent.length >= 6) {
    const v = mastPresent.reduce((a,k) => a + parseInt(answers[k]),0) / mastPresent.length;
    scores.MAST = { value: +v.toFixed(1), label: 'MAST Composite', max: 5, interp: v>=4?'High':v>=3?'Moderate':'Low', color: v>=4?'#16a34a':v>=3?'#ca8a04':'#dc2626' };
  }

  return scores;
}

const DTAM_CONFIG = {
  API_ENDPOINT: null,           // e.g. 'https://your-server.com/api/responses'
  API_KEY:      null,           // Bearer token if required
  STORAGE_KEY:  'dtam_my_responses',
  VERSION:      'v2.0',

};

function submitResponse(group, answers, scores) {
  const record = {
    id:        `${DTAM_CONFIG.STUDY_ID}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
    studyId:   DTAM_CONFIG.STUDY_ID,
    version:   DTAM_CONFIG.VERSION,
    timestamp: new Date().toISOString(),
    group,
    answers,
    scores,
    meta: {
      // navigator.userAgent removed — PDPA 2010 compliance: device fingerprint is personal data
      // and was not disclosed in the consent screen. Only language preference retained.
      lang: navigator.language,
    }
  };

  // 1. Always save to localStorage (offline backup + dashboard feed)
  try {
    const existing = JSON.parse(localStorage.getItem(DTAM_CONFIG.STORAGE_KEY) || '[]');
    existing.push(record);
    localStorage.setItem(DTAM_CONFIG.STORAGE_KEY, JSON.stringify(existing));
  } catch(e) { console.warn('localStorage save failed:', e); }

  // 2. If API endpoint configured, also POST to server
  if (DTAM_CONFIG.API_ENDPOINT) {
    const headers = { 'Content-Type': 'application/json' };
    if (DTAM_CONFIG.API_KEY) headers['Authorization'] = `Bearer ${DTAM_CONFIG.API_KEY}`;
    fetch(DTAM_CONFIG.API_ENDPOINT, { method: 'POST', headers, body: JSON.stringify(record) })
      .catch(err => console.warn('API submission failed (data saved locally):', err));
  }

  return record.id;
}

// Map scale arrays to their SCALE_TRANS key
function getScaleKey(scale) {
  if (!scale) return null;
  const f = scale[0];
  if (f==='Strongly Disagree') return 'SD_SA';
  if (f==='Never'&&scale[4]==='Always') return 'N_A';
  if (f==='1'&&scale.length===5) return 'NUM';
  if (f==='Very Poor') return 'WQ1';
  if (f==='Very Dissatisfied') return 'WSAT';
  if (f==='Not at all') return 'WCAP';
  if (f==='Never'&&scale[1]==='Seldom') return 'WFREQ';
  if (f==='Never'&&scale[4]==='Nearly Always') return 'ZBI';
  if (f==='Cannot do at all'&&scale[4]==='No difficulty') return 'ICF1';
  if (f==='Cannot do at all'&&scale[1]==='Only with major help') return 'ICF2';
  if (f==='Cannot do at all'&&scale[1]==='Great difficulty') return 'ICF3';
  if (f==='Not at all'&&scale[4]==='Fully able') return 'ICF4';
  return null;
}

function translateScale(scale, lang) {
  if (!scale || lang === 'en') return scale;
  const key = getScaleKey(scale);
  return (key && SCALE_TRANS[lang]?.[key]) || scale;
}

    sus3:'அமைப்பு எளிமையாகவும் நேர்மையாகவும் இயக்க உணர்கிறதா?',

    sus5:'அமைப்பின் வெவ்வேறு அம்சங்கள் சீராக ஒன்றிணைந்து வேலை செய்கிறதா?',
    sus6:'தலைகீழ் உருப்படி: உடன்படுவது சீரற்ற தன்மை பிரச்சினைகளை குறிக்கிறது.',
    sus7:'சராசரி நபர் இந்த அமைப்பை விரைவாக கற்றுக்கொள்வார்களா?',
    sus8:'தலைகீழ் உருப்படி: "மிகவும் உடன்படுகிறேன்" என்பது நீங்கள் அதை சிரமகரமாகவும் கடினமாகவும் கண்டீர்கள் என்று பொருள்.',
    sus9:'டெலிரீஹேபிலிடேஷன் அமைப்பை பயன்படுத்தும்போது திறமையாகவும் நம்பிக்கையாகவும் உணர்கிறீர்களா?',
    sus10:'தலைகீழ் உருப்படி: உடன்படுவது கடினமான கற்றல் வளைவைக் குறிக்கிறது.',
    // ZBI
    zbi1:'பராமரிப்பு பெறுபவர் அவர்களின் நிலைக்கு தேவையதை விட அதிக உதவி கேட்கிறார்களா?',
    zbi2:'பராமரிப்பு உங்கள் தனிப்பட்ட நேரத்தை குறிப்பிடத்தக்க அளவில் குறைத்திருக்கிறதா?',
    zbi3:'வேலை, குடும்பம் அல்லது சமூக கடமைகளுடன் பராமரிப்பை சமப்படுத்துவதில் பதட்டம் உணர்கிறீர்களா?',
    zbi4:'பராமரிப்பு பெறுபவரின் நடத்தை (நினைவு, பேச்சு, உடல்) உங்களுக்கு சங்கடம் ஏற்படுத்தியிருக்கிறதா?',
    zbi5:'பராமரிப்பு தொடர்புகளில் சில நேரம் கோபமாகவோ விரக்தியாகவோ உணர்கிறீர்களா?',
    zbi6:'பராமரிப்பு மற்ற குடும்ப உறுப்பினர்களுடனான உங்கள் உறவை மாற்றியிருக்கிறதா?',
    zbi7:'பராமரிப்பு பெறுபவரின் ஆரோக்கியம் அல்லது எதிர்கால நலனைப் பற்றி கவலைப்படுகிறீர்களா?',
    zbi8:'பராமரிப்பு பெறுபவர் தினசரி செயல்பாடுகளுக்கு உங்களை மிகவும் சார்ந்துள்ளார்களா?',
    zbi9:'பராமரிப்பு வழங்கும்போது உணர்வு அல்லது உடல் ரீதியான பதட்டம் உணர்கிறீர்களா?',
    zbi10:'பராமரிப்பு உங்கள் சொந்த உடல் அல்லது மன ஆரோக்கியத்தை பாதிக்கிறதா?',
    zbi11:'பராமரிப்பு உங்கள் தனிப்பட்ட இடம் மற்றும் தனியுரிமையை குறைத்திருக்கிறதா?',
    zbi12:'பராமரிப்பால் சமூக நடவடிக்கைகள், நட்புகள் அல்லது பொழுதுபோக்குகள் குறைந்திருக்கிறதா?',
    zbi13:'பராமரிப்பு சூழ்நிலை விருந்தினர்களை வரவேற்பதை கடினமாக அல்லது சங்கடமாக ஆக்கியிருக்கிறதா?',
    zbi14:'பராமரிப்பு பெறுபவர் நீங்கள் எப்போதும் உதவ கிடைப்பீர்கள் என்று கருதுகிறார்களா?',
    zbi15:'பராமரிப்பு உங்கள் குடும்பத்தில் நிதி அழுத்தத்தை ஏற்படுத்துகிறதா?',
    zbi16:'எதிர்காலத்தில் பராமரிப்பை தொடர முடியாமல் போகலாம் என்று கவலைப்படுகிறீர்களா?',
    zbi17:'பராமரிப்பு உங்கள் வாழ்க்கையில் கட்டுப்பாடு குறைவாக உள்ளது என்று உணர வைக்கிறதா?',
    zbi18:'வேறு யாராவது உங்கள் பராமரிப்பு பாத்திரத்தை ஏற்கலாம் என்று சில நேரம் விரும்புகிறீர்களா?',
    zbi19:'பராமரிப்பு பெறுபவரை எவ்வாறு சிறப்பாக கவனிப்பது என்று அல்லது என்ன முடிவு எடுப்பது என்று தெரியாமல் தடுமாறுகிறீர்களா?',
    zbi20:'போதுமான பராமரிப்பு வழங்கவில்லை என்று குற்ற உணர்வு உள்ளதா?',
    zbi21:'பராமரிப்பாளராக மேம்பட இடம் உள்ளது என்று நம்புகிறீர்களா?',
    zbi22:'எல்லாவற்றையும் கணக்கிட்டால், பராமரிப்பில் இருந்து ஒட்டுமொத்த சுமையை எவ்வளவு அடிக்கடி உணர்கிறீர்கள்?',
    // WHOQOL
    wq1:'இப்போது உங்கள் வாழ்க்கை எவ்வளவு நன்றாக உள்ளது என்பதற்கான மொத்த மதிப்பீடு.',
    wq2:'உங்கள் உடல் ஆரோக்கியத்தில் எவ்வளவு திருப்தி உள்ளது?',
    wq3:'உடல் வலி தினசரி செயல்பாடுகளை செய்யும் உங்கள் திறனை கட்டுப்படுத்துகிறதா?',

    wq5:'தினசரி வாழ்க்கையில் எவ்வளவு மகிழ்ச்சி அல்லது ஆனந்தம் அனுபவிக்கிறீர்கள்?',
    wq6:'உங்கள் வாழ்க்கைக்கு நோக்கமும் அர்த்தமும் உள்ளதாக உணர்கிறீர்களா?',
    wq7:'தேவைப்படும்போது கவனம் செலுத்தவும் கவனத்தை திரட்டவும் முடிகிறதா?',
    wq8:'உங்கள் வீட்டிலும் சுற்றுப்புறத்திலும் பாதுகாப்பாகவும் பாதுகாப்பாகவும் உணர்கிறீர்களா?',
    wq9:'உங்கள் வசிக்கும் சூழல் சுத்தமாகவும், அமைதியாகவும், மாசுபாடு இல்லாமலும் உள்ளதா?',
    wq10:'ஒவ்வொரு நாளையும் கடக்க போதுமான உடல் ஆற்றல் உள்ளதா?',
    wq11:'உங்கள் உடல் தோற்றத்தில் வசதியாக உணர்கிறீர்களா?',
    wq12:'தினசரி வாழ்க்கை செலவுகளுக்கு நிதி வளங்கள் போதுமானதா?',
    wq13:'தேவைப்படும்போது தகவல்களை (சுகாதாரம், செய்திகள், சேவைகள்) எளிதாக அணுக முடியுமா?',
    wq14:'பொழுதுபோக்குகள், பொழுதுபோக்கு அல்லது ஓய்வுக்கு நேரமும் வாய்ப்பும் உள்ளதா?',
    wq15:'உடல் இயக்கம்: சுயமாக நடக்க, படிகள் ஏற, பயணிக்க முடியுமா?',
    wq16:'தூக்கத்தின் தரமும் கால அளவும் திருப்திகரமாக உள்ளதா?',
    wq17:'அன்றாட வாழ்க்கை செயல்பாடுகள்: உடை அணிதல், குளித்தல், சமைத்தல், தினசரி பணிகளை செய்யும் திறனில் திருப்தி உள்ளதா?',
    wq18:'வேலை திறன்: வேலை அல்லது தினசரி பாத்திரங்கள் மூலம் என்ன செய்ய முடியும் என்பதில் திருப்தி உள்ளதா?',
    wq19:'ஒட்டுமொத்த சுய திருப்தி: நீங்கள் யார் என்பதில் எவ்வளவு மகிழ்ச்சியாக உள்ளீர்கள்?',
    wq20:'நட்புகள், குடும்ப பந்தங்கள் மற்றும் சமூக தொடர்புகளில் திருப்தி உள்ளதா?',
    wq21:'நெருங்கிய அல்லது பாலின உறவுகளில் திருப்தி உள்ளதா? (பொருந்தவில்லை என்றால் தவிர்க்கலாம்)',
    wq22:'நண்பர்கள் போதுமான உணர்வு அல்லது நடைமுறை ஆதரவு வழங்குகிறார்களா?',
    wq23:'வீடு பற்றி திருப்தி உள்ளதா — பாதுகாப்பு, இடம், சுத்தம்?',
    wq24:'தேவைப்படும்போது மருத்துவமனைகள், கிளினிக்குகள், மருந்தகங்களை அணுக முடியுமா?',
    wq25:'பயண முறை (கார், பொது போக்குவரத்து, நடை) திருப்திகரமாக உள்ளதா?',
    wq26:'எதிர்மறை உணர்வுகளை எவ்வளவு அடிக்கடி அனுபவிக்கிறீர்கள்? குறைவான அதிர்வெண் = சிறந்த வாழ்க்கைத் தரம்.',
    // MAST

    mast5:'டொமைன் 3 — சுகாதார நிபுணர்கள்: டெலிரீஹேபிலிடேஷன் தற்போதைய மருத்துவ பணி ஓட்டங்களுடன் இணக்கமாக உள்ளதா?',
    mast6:'ஊழியர்களுக்கு தொலை மறுவாழ்வு சேவை வழங்க போதுமான பயிற்சி மற்றும் திறன் உள்ளதா?',
    mast7:'டொமைன் 4 — பொருளாதாரம்: செலவு சேமிப்பு டெலிரீஹேபிலிடேஷன் முதலீட்டை நியாயப்படுத்துகிறதா?',
    mast8:'டொமைன் 5 — தொழில்நுட்ப அம்சங்கள்: மலேசிய சுகாதார சூழலில் தொழில்நுட்பம் நடைமுறையாகவும் நம்பகமாகவும் உள்ளதா?',

function getQHelper(q, lang) {
  if (lang === 'en' || !q.helper) return q.helper;
  return HELPER_TRANS[lang]?.[q.id] || q.helper;
}

// ─── QUALITY CHECK ────────────────────────────────────────────────────────────
function checkQuality(sectionId, answers) {
  const qs = Q[sectionId];
  if (!qs) return null;
  const scaleQs = qs.questions.filter(q => q.scale && answers[q.id]);
  if (scaleQs.length < 4) return null;
  const vals = scaleQs.map(q => parseInt(answers[q.id])).filter(v => !isNaN(v));
  // Straight-line detection
  const allSame = vals.length > 3 && vals.every(v => v === vals[0]);
  if (allSame) return 'straightline';
  // SUS reverse consistency
  if (sectionId === 'sus') {
    const fwd = ['sus1','sus3','sus5','sus7','sus9'].filter(k => answers[k]).map(k => parseInt(answers[k]));
    const rev = ['sus2','sus4','sus6','sus8','sus10'].filter(k => answers[k]).map(k => parseInt(answers[k]));
    if (fwd.length >= 3 && rev.length >= 3) {
      const fwdMean = fwd.reduce((a,b)=>a+b,0)/fwd.length;
      const revMean = rev.reduce((a,b)=>a+b,0)/rev.length;
      if (Math.abs(fwdMean - revMean) < 0.5) return 'reverseInconsistent';
    }
  }
  return null;
}

// Language selector bar
function LangBar({ lang, setLang }) {
  const langs = [{ k:'en', label:'EN' }, { k:'bm', label:'BM' }, { k:'zh', label:'中文' }, { k:'ta', label:'தமிழ்' }];
  return (
    <div className="lang-pills">
      {langs.map(l => (
        <button key={l.k} className={`lang-btn${lang===l.k?' active':''}`} onClick={() => setLang(l.k)}>{l.label}</button>
      ))}
    </div>

}

// Likert question
function LikertQuestion({ q, value, onChange, lang }) {
  const t = T[lang];
  const [showHelper, setShowHelper] = useState(false);
  const qText  = getQText(q, lang);
  const scale  = translateScale(q.scale, lang);
  return (
    <div className={`question-block${value ? ' answered' : ''}`}>
      <div className="question-num">{q.id.toUpperCase()} {q.construct ? `· ${q.construct}` : ''} {q.domain ? `· ${q.domain}` : ''}</div>
      <div className="question-text">
        {qText}
        {q.reversed && <span className="reversed">▲ REVERSE</span>}
        <button className="helper-btn" onClick={() => setShowHelper(!showHelper)}>💡 {t.helper}</button>
      </div>
      {showHelper && <div className="helper-box">💡 {getQHelper(q, lang)}</div>}
      <div className="likert-labels">
        <span>{scale[0]}</span>
        <span>{scale[scale.length-1]}</span>
      </div>
      <div className="likert-wrap">
        {scale.map((label, i) => {
          const val = q.zeroBased ? String(i) : String(i+1);
          return (
            <div className="likert-option" key={i}>
              <input type="radio" name={q.id} id={`${q.id}_${i}`} value={val} checked={value===val} onChange={e=>onChange(q.id, e.target.value)} />
              <label htmlFor={`${q.id}_${i}`}>
                <div className="bubble">{q.zeroBased ? i : i+1}</div>
                <div className="lbl">{label}</div>
              </label>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Select placeholder by language
const SELECT_PLACEHOLDER = { en:'— Select —', bm:'— Pilih —', zh:'— 请选择 —', ta:'— தேர்ந்தெடுக்கவும் —' };
const TEXT_PLACEHOLDER   = { en:'Enter your response...', bm:'Masukkan jawapan anda...', zh:'请输入您的回答...', ta:'உங்கள் பதிலை உள்ளிடுக...' };

// Select/Text/Radio question
function GenQuestion({ q, value, onChange, lang }) {
  const t = T[lang];
  const [showHelper, setShowHelper] = useState(false);
  const qText   = getQText(q, lang);
  const opts    = translateOptions(q.id, q.options, lang);
  // For display labels, map translated option back if values must stay in English for scoring
  return (
    <div className={`question-block${value ? ' answered' : ''}`}>
      <div className="question-num">{q.id.toUpperCase()}</div>

      </div>
      {showHelper && <div className="helper-box">💡 {getQHelper(q, lang)}</div>}
      {q.type === 'select' && (
        <select className="select-input" value={value||''} onChange={e=>onChange(q.id, e.target.value)}>

          {q.options.map((o, i) => (

// Survey Section
function SurveySection({ sectionId, answers, onAnswer, lang }) {
  const t = T[lang];
  const section = Q[sectionId];
  if (!section) return null;
  const quality = checkQuality(sectionId, answers);

  return (
    <div>
      <div className="section-header">
        <h3>{getSectionTitle(sectionId, lang) || section.title}</h3>
        {(getSectionInstructions(sectionId, lang) || section.instructions) &&
          <p>{getSectionInstructions(sectionId, lang) || section.instructions}</p>}
        <span className="section-source">{getSectionSource(sectionId, lang) || section.source}</span>
      </div>
      {quality && <div className="quality-alert"><span className="icon">⚠️</span><span>{t[quality] || t.straightline}</span></div>}
      {section.questions.map(q => (
        q.scale
          ? <LikertQuestion key={q.id} q={q} value={answers[q.id]} onChange={onAnswer} lang={lang} />
          : <GenQuestion key={q.id} q={q} value={answers[q.id]} onChange={onAnswer} lang={lang} />
      ))}
    </div>
  );
}

// Score card component
function ScoreCard({ score, lang }) {
  const pct = score.max === 100 ? score.value : (score.value / score.max) * 100;
  return (
    <div className="score-card">
      <div className="score-val" style={{color: score.color}}>{score.value}</div>
      <div className="score-label">{(SCORE_LABELS[lang]||SCORE_LABELS.en)[score.key] || score.label}</div>
      <div className="score-label" style={{fontSize:'10px',marginTop:'2px'}}>/ {score.max}</div>
      <div className={`score-interp ${pct>=60?'good':pct>=40?'moderate':'poor'}`}>{(SCORE_INTERP[lang]||SCORE_INTERP.en)[score.interp] || score.interp}</div>
      <div style={{marginTop:'8px'}}>
        <div className="domain-bar-track">
          <div className="domain-bar-fill" style={{width:`${Math.min(pct,100)}%`, background: score.color}}></div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState('en');

  // [v2] M3 — Update html lang attribute for screen readers on language switch
  const LANG_CODES = { en:'en', bm:'ms', zh:'zh-Hans', ta:'ta' };
  useEffect(() => {
    document.documentElement.lang = LANG_CODES[lang] || lang;
  }, [lang]);
  const [page, setPage] = useState('intro'); // intro | landing | consent | survey | report
  const [group, setGroup] = useState(null);
  const [currentSectionIdx, setCurrentSectionIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [consentGiven, setConsentGiven] = useState(false);
  const [showError, setShowError] = useState(false);
  const [submittedId, setSubmittedId] = useState(null);
  const t = T[lang];

  const flow = group ? FLOWS[group] : [];
  const currentSection = flow[currentSectionIdx];
  const totalSections = flow.length;

  const handleAnswer = useCallback((id, val) => {
    setAnswers(prev => ({ ...prev, [id]: val }));
    setShowError(false);
  }, []);

  const sectionAnsweredCount = useMemo(() => {
    if (!currentSection) return 0;
    const sec = Q[currentSection];
    if (!sec) return 0;
    return sec.questions.filter(q => answers[q.id] != null && answers[q.id] !== '').length;
  }, [currentSection, answers]);

  const sectionRequiredCount = useMemo(() => {
    if (!currentSection) return 0;
    const sec = Q[currentSection];
    if (!sec) return 0;
    return sec.questions.filter(q => q.required !== false).length;
  }, [currentSection]);

  const canProceed = useMemo(() => {
    if (!currentSection) return true;
    const sec = Q[currentSection];
    if (!sec) return true;
    return sec.questions.filter(q => q.required !== false).every(q => answers[q.id] != null && answers[q.id] !== '');
  }, [currentSection, answers]);

  const scores = useMemo(() => group ? scoreSurvey(group, answers) : {}, [group, answers, page]);

  function handleNext() {
    if (!canProceed) { setShowError(true); return; }
    setShowError(false);
    if (currentSectionIdx < totalSections - 1) {
      setCurrentSectionIdx(prev => prev + 1);
      window.scrollTo(0,0);
    } else {
      const finalScores = scoreSurvey(group, answers);
      const id = submitResponse(group, answers, finalScores);
      setSubmittedId(id);
      setPage('report');
      window.scrollTo(0,0);
    }
  }

  function handleBack() {
    setShowError(false);
    if (currentSectionIdx > 0) {
      setCurrentSectionIdx(prev => prev - 1);
      window.scrollTo(0,0);
    } else {
      setPage('consent');
    }
  }

  function handleRestart() {
    setPage('intro');
    setGroup(null);
    setAnswers({});
    setConsentGiven(false);
    setCurrentSectionIdx(0);
    window.scrollTo(0,0);
  }

  const groupIcons = { allied:'🏥', caregiver:'💛', elderly:'🧓', policy:'🏛️', public:'🌏' };

  // ── SHARED HEADER ──
  const AppHeader = () => (

                <strong>Principal Investigator:</strong> CHONG Yu Zheng (Student ID: 24UED03838), PhD Candidate, Lee Kong Chian Faculty of Engineering and Science (LKC FES), Universiti Tunku Abdul Rahman (UTAR), Sungai Long Campus, 43000 Kajang, Selangor, Malaysia.<br/>
                <strong>Main Supervisor:</strong> Assoc. Prof. Dr. Kwan Ban Hoe — Dept. of Mechatronics &amp; BioMedical Engineering, LKC FES, UTAR (kwanbh@utar.edu.my)<br/>
                <strong>Co-Supervisor:</strong> Assoc. Prof. Ir. Dr. Goh Choon Hian — LKC FES, UTAR
              </div>
              <div className="consent-section">3. Purpose of the Study</div>
              <div className="consent-body">This research aims to develop and validate a technology assessment model (DTAM-MY) for telerehabilitation services targeting elderly post-stroke patients in Malaysia. You are being invited to complete this questionnaire as a member of the {group ? t.groups[group]?.name : 'stakeholder'} group.</div>
              <div className="consent-section">4. Voluntary Participation</div>
              <div className="consent-body">Your participation is entirely voluntary. You may withdraw at any time without penalty. Refusing to participate will not affect any benefits, services or treatment you may otherwise receive.</div>
              <div className="consent-section">5. Confidentiality and Data Protection</div>
              <div className="consent-body">All responses are anonymous and confidential. No personally identifiable information will be collected. Data will be stored securely and processed in accordance with the Personal Data Protection Act 2010 (PDPA, Act 709) on Malaysia-hosted servers. Data will be used solely for academic research purposes.</div>
              <div className="consent-section">6. Risks and Benefits</div>
              <div className="consent-body">This study involves minimal risk. There are no direct benefits to you from participation, but your responses will contribute to the development of better telerehabilitation services for elderly Malaysians. If you feel distressed at any point, please stop and contact the research team at UTAR.</div>
              <div className="consent-section">7. Duration</div>
              <div className="consent-body">Estimated completion time: 15–30 minutes depending on your stakeholder group.</div>
              <div className="consent-section">8. Ethics Approval</div>
              <div className="consent-body">This study has been reviewed and approved by the UTAR University Research Ethics Committee (UREC). Reference: UTAR/UREC/2025 (pending). ICH E6(R2) GCP guidelines and the Declaration of Helsinki (WMA, 2013) are observed throughout this study.</div>
              <div className="consent-section">9. Contact</div>
              <div className="consent-body">For questions, contact the UTAR Lee Kong Chian Faculty of Engineering and Science (LKC FES) research office, Sungai Long Campus.</div>
            </>) : (() => {
              const c = CONSENT_TRANS[lang] || CONSENT_TRANS.bm;
              return (<>
                <div className="consent-section">{c.s1t}</div><div className="consent-body">{c.s1b}</div>
                <div className="consent-section">{c.s2t}</div><div className="consent-body">{c.s2b}</div>
                <div className="consent-section">{c.s3t}</div>
                <div className="consent-body">{c.s3b} ({group ? t.groups[group]?.name : ''})</div>
                <div className="consent-section">{c.s4t}</div><div className="consent-body">{c.s4b}</div>
                <div className="consent-section">{c.s5t}</div><div className="consent-body">{c.s5b}</div>
                <div className="consent-section">{c.s6t}</div><div className="consent-body">{c.s6b}</div>
                <div className="consent-section">{c.s7t}</div><div className="consent-body">{c.s7b}</div>
                <div className="consent-section">{c.s8t}</div><div className="consent-body">{c.s8b}</div>
                <div className="consent-section">{c.s9t}</div><div className="consent-body">{c.s9b}</div>
              </>);
            })()}
          </div>
          <div className="consent-check" onClick={() => setConsentGiven(!consentGiven)}>
            <input type="checkbox" id="consent" checked={consentGiven} onChange={e => setConsentGiven(e.target.checked)} />
            <label htmlFor="consent">{t.consentAgree}</label>
          </div>
          <div className="nav-btns">
            <button className="btn btn-secondary" onClick={() => setPage('landing')}>← {t.back}</button>
            <button className="btn btn-primary" disabled={!consentGiven} onClick={() => { setPage('survey'); setCurrentSectionIdx(0); window.scrollTo(0,0); }}>
              {t.next} →
            </button>
          </div>
        </div>
      </div>
    </>
  );

  // ── SURVEY ──
  if (page === 'survey') {
    const progress = ((currentSectionIdx) / totalSections) * 100;
    return (
      <>
        <AppHeader />
        <div className="container">
          {/* Progress */}
          <div className="card" style={{padding:'16px 20px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
              <span style={{fontSize:'13px',fontWeight:600,color:'var(--navy)'}}>{t.section} {currentSectionIdx+1} {t.of} {totalSections}: <strong>{getSectionTitle(currentSection, lang) || Q[currentSection]?.title}</strong></span>
              <span style={{fontSize:'12px',color:'var(--muted)'}}>{sectionAnsweredCount}/{Q[currentSection]?.questions.length} {t.answered}</span>
            </div>
            <div className="progress-bar-wrap">
              <div className="progress-bar" style={{width:`${progress}%`}}></div>
            </div>
            <div className="progress-label">
              {/* Desktop/tablet: full section strip */}
              <span className="progress-section-strip">{flow.map((s,i) => <span key={s} style={{marginRight:'8px',color:i===currentSectionIdx?'var(--teal)':i<currentSectionIdx?'var(--navy)':'var(--muted)',fontWeight:i===currentSectionIdx?700:400,fontSize:'11px'}}>{(SECTION_SHORT[lang]||SECTION_SHORT.en)[s]||s}{i<totalSections-1?' →':''}</span>)}</span>
              {/* Mobile: just current section name */}
              <span className="progress-section-current" style={{display:'none',fontSize:'12px',color:'var(--teal)',fontWeight:700}}>{getSectionTitle(currentSection, lang) || Q[currentSection]?.title}</span>
              <span style={{color:canProceed?'var(--success)':'var(--muted)',fontSize:'12px',whiteSpace:'nowrap'}}>{canProceed ? (t.ready||'✓ Ready') : `${sectionRequiredCount - sectionAnsweredCount} ${t.remaining||'left'}`}</span>
            </div>
          </div>

          {showError && (
            <div className="quality-alert">
              <span className="icon">❗</span>
              <span>{t.required}</span>
            </div>
          )}

          <SurveySection sectionId={currentSection} answers={answers} onAnswer={handleAnswer} lang={lang} />

          <div className="nav-btns">
            <button className="btn btn-secondary" onClick={handleBack}>← {t.back}</button>
            <button className="btn btn-primary" onClick={handleNext}>
              {currentSectionIdx < totalSections-1 ? `${t.next} →` : `${t.submit} ✓`}
            </button>
          </div>
        </div>
      </>
    );
  }

  // ── REPORT ──
  if (page === 'report') {
    const scoreList = Object.entries(scores);
    return (
      <>
        <AppHeader />
        <div className="container">
          {/* Submission confirmation banner */}
          {submittedId && (
            <div style={{background:'#dcfce7',border:'1px solid #86efac',borderRadius:'10px',padding:'12px 18px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'12px',fontSize:'var(--fs-sm)'}}>
              <span style={{fontSize:'20px'}}>✅</span>
              <div>
                <strong style={{color:'#166534'}}>{t.savedSuccess}</strong>
                <div style={{color:'#15803d',fontSize:'var(--fs-xs)',marginTop:'2px'}}>
                  ID: <code style={{fontFamily:'monospace',background:'#bbf7d0',padding:'1px 6px',borderRadius:'4px'}}>{submittedId}</code>
                  &nbsp;·&nbsp;{t.savedLocal}
                </div>
              </div>
            </div>
          )}

          <div className="report-header">
            <div style={{fontSize:'40px',marginBottom:'12px'}}>📊</div>
            <h2>{t.reportTitle}</h2>
            <p>{t.reportDesc}</p>
            <div style={{marginTop:'12px',fontSize:'12px',opacity:'0.7'}}>
              {t.groupLabel}: {t.groups[group]?.name} | {new Date().toLocaleDateString()} | DTAM-MY v2.0
            </div>
          </div>

          {scoreList.length > 0 && (
            <div className="card">
              <div className="card-title">📊 {t.domainScores}</div>
              <div className="card-desc" style={{marginBottom:'20px'}}>{t.domainScoresDesc}</div>
              <div className="score-grid">
                {scoreList.map(([key, score]) => <ScoreCard key={key} score={{...score, key}} lang={lang} />)}
              </div>
            </div>
          )}

          {/* Score interpretation guide */}
          <div className="card">
            <div className="card-title">📖 {t.scoreInterp}</div>
            <div className="card-desc">
              {group === 'allied' || group === 'elderly' ? <>
                <div className="domain-bar" style={{marginTop:'16px'}}>
                  <div className="domain-bar-label"><span>{t.susBenchmarkTitle}</span></div>
                  <div style={{fontSize:'13px',lineHeight:'2'}}>
                    <span style={{color:'#16a34a',fontWeight:700}}>{t.susExcellent}</span> · <span style={{color:'#ca8a04',fontWeight:700}}>{t.susAcceptable}</span> · <span style={{color:'#dc2626',fontWeight:700}}>{t.susPoor}</span>
                  </div>
                </div>
              </> : null}
              {group === 'caregiver' ? <>
                <div style={{fontSize:'13px',lineHeight:'2',marginTop:'8px'}}>
                  {t.zbiLevels}
                </div>
              </> : null}
              {group === 'elderly' ? <>
                <div style={{fontSize:'13px',lineHeight:'2',marginTop:'8px'}}>
                  {t.whoqolDesc}
                </div>
              </> : null}
              <div style={{fontSize:'13px',lineHeight:'2',marginTop:'8px'}}>
                {t.tamDesc}
              </div>
            </div>
          </div>

          {/* Response summary table */}
          <div className="card">
            <div className="card-title">📝 {t.responseSummary}</div>
            <div className="card-desc">{t.totalSectionsLabel}: {flow.length} | {t.totalItemsLabel}: {Object.keys(answers).length}</div>
            <div className="report-table-wrap" style={{overflowX:'auto',marginTop:'16px',WebkitOverflowScrolling:'touch'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px',minWidth:'480px'}}>
                <thead>
                  <tr style={{background:'var(--lgrey)'}}>
                    <th style={{textAlign:'left',padding:'8px',borderBottom:'1px solid #e5e7eb',color:'var(--navy)'}}>{t.tableItemId}</th>
                    <th style={{textAlign:'left',padding:'8px',borderBottom:'1px solid #e5e7eb',color:'var(--navy)'}}>{t.tableQuestion}</th>
                    <th style={{textAlign:'center',padding:'8px',borderBottom:'1px solid #e5e7eb',color:'var(--navy)'}}>{t.tableResponse}</th>
                  </tr>
                </thead>
                <tbody>
                  {flow.flatMap(sId => Q[sId] ? Q[sId].questions.map(q => ({...q, section:Q[sId].title})) : []).map((q,i) => (
                    <tr key={q.id} style={{background:i%2===0?'white':'var(--lgrey)'}}>
                      <td style={{padding:'6px 8px',fontFamily:'monospace',color:'var(--teal)',fontWeight:600,borderBottom:'1px solid #f3f4f6'}}>{q.id}</td>
                      <td style={{padding:'6px 8px',borderBottom:'1px solid #f3f4f6',maxWidth:'400px'}}>{(()=>{const t=getQText(q,lang);return t.length>80?t.substring(0,80)+'…':t;})()}</td>
                      <td style={{padding:'6px 8px',textAlign:'center',borderBottom:'1px solid #f3f4f6'}}>
                        {answers[q.id] != null
                          ? <span style={{background:'var(--lteal)',color:'var(--teal)',borderRadius:'4px',padding:'2px 8px',fontWeight:700}}>{answers[q.id]}</span>
                          : <span style={{color:'#d1d5db'}}>—</span>
                        }
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div style={{display:'flex',gap:'12px',justifyContent:'center',flexWrap:'wrap',marginBottom:'32px'}}>
            <button className="btn btn-primary" onClick={() => window.print()}>🖨️ {t.print}</button>
            <button className="btn btn-secondary" onClick={handleRestart}>🔄 {t.restart}</button>
            <button className="btn btn-secondary" onClick={() => window.open('telerehab_dashboard.html','_blank')}
              style={{borderColor:'var(--teal)',color:'var(--teal)'}}>
              📊 {t.openDashboard}
            </button>
          </div>

          <div style={{textAlign:'center',color:'var(--muted)',fontSize:'11px',paddingBottom:'24px'}}>
            DTAM-MY Research Suite v2.0 | UTAR | GCP-compliant | PDPA 2010<br/>
            Frameworks: MAST · TAM · UTAUT2 · TUQ · ICF · SUS · WHOQOL-BREF · ZBI
          </div>
        </div>
      </>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
