    </div>

    <!-- RIGHT: Log -->
    <div class="right-panel">
      <div class="card">
        <div class="card-hd">Completed (${completedQ()} / ${tot})</div>
        <div style="max-height:300px;overflow-y:auto">
          ${allQuestions().map(q2 => {
            const r2 = getR(q2.code);
            const label = r2.status==="done"?"done":r2.status==="skip"&&r2.transcript?"partial":"skip";
            const labelText = label==="done"?"✓ Done":label==="partial"?"~ Partial":"— Skip";
            const tq = (S.lang !== 'en' && TRANSLATIONS[S.group] && TRANSLATIONS[S.group][S.lang] && TRANSLATIONS[S.group][S.lang][q2.code]) ? TRANSLATIONS[S.group][S.lang][q2.code].question : q2.text;
            return `<div class="log-item">
              <span class="log-code">${q2.code}</span>
              <span class="log-status ${label}">${labelText}</span>
              <div class="log-text">${r2.transcript ? r2.transcript.substring(0,55)+'…' : tq.substring(0,55)+'…'}</div>
            </div>`;
          }).join("")}
        </div>
      </div>

      <div class="card">
        <div class="card-hd">STT Engine</div>
        <div class="card-body">
          ${[
            ["Engine", "Web Speech API (built-in)"],
            ["Language", `${LANG_MAP[S.lang]||"en-US"}`],
            ["Mode", "Continuous · Interim results"],
            ["Data", "On-device — no cloud"],
            ["Browser", "Chrome / Edge required"],
          ].map(([k,v])=>`<div style="display:flex;justify-content:space-between;
            font-size:12px;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--lgrey)">
            <span style="color:var(--muted)">${k}</span><strong>${v}</strong></div>`).join("")}
          <div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.6">
            Transcript updates live as you speak. Tap ⏹ to stop; edit any errors in the box below.
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-hd">Interview Tips</div>
        <div class="card-body">
          <ul style="font-size:12px;color:var(--muted);padding-left:16px;line-height:1.9">
            <li>Allow 10–15 s silence after question before probing</li>
            <li>Use probes sparingly — avoid leading</li>
            <li>Note non-verbal cues in Researcher Notes</li>
            <li>Save frequently; data persists in session</li>
            <li>Tamil: add extra time allowance (${S.lang==="ta"?"⚠ Active":"N/A"})</li>
          </ul>
        </div>
      </div>
    </div>

  </div>
</div>`;
}

function renderSummary() {
  const grp = QB[S.group];
  const qs = allQuestions();
  const done = qs.filter(q => getR(q.code).status==="done").length;
  const partial = qs.filter(q => { const r=getR(q.code); return r.status!=="done" && r.transcript; }).length;
  const skipped = qs.length - done - partial;
  return `
<div class="screen">
  <div class="card summary-card">
    <h3 style="color:var(--navy);margin-bottom:4px">✅ Interview Complete</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:18px">
      ${S.sessionId} · ${S.participantId} · ${grp.label}
    </p>
    <div class="sum-row"><span>Total Questions</span><strong>${qs.length}</strong></div>
    <div class="sum-row"><span>Fully Completed</span><span class="tag tag-green">${done}</span></div>
    <div class="sum-row"><span>Partial (transcript only)</span><span class="tag tag-orange">${partial}</span></div>
    <div class="sum-row"><span>Skipped</span><span class="tag tag-grey">${skipped}</span></div>
    <div class="sum-row"><span>Analysis Method</span><span style="font-size:12px">${grp.method}</span></div>

    <div style="margin-top:16px;border-top:1px solid var(--lgrey);padding-top:14px;
      max-height:260px;overflow-y:auto">
      ${grp.sections.map(sec => `
        <div style="margin-bottom:12px">
          <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px">
            ${sec.id}: ${sec.title}
          </div>
          ${sec.questions.map(q => {
            const r = getR(q.code);
            const badge = r.status==="done"
              ? '<span class="tag tag-green">Done</span>'
              : r.transcript
                ? '<span class="tag tag-orange">Partial</span>'
                : '<span class="tag tag-grey">Skip</span>';
            return `<div style="display:flex;gap:8px;align-items:flex-start;
              padding:5px 0;border-bottom:1px solid var(--lgrey);font-size:12px">
              <strong style="min-width:40px">${q.code}</strong>
              <span style="flex:1;color:var(--muted)">${r.transcript
                ? r.transcript.substring(0,70)+(r.transcript.length>70?"…":"")
                : "(no transcript)"}</span>
              ${badge}
            </div>`;
          }).join("")}
        </div>`).join("")}
    </div>

    <div style="display:flex;gap:8px;margin-top:18px">
      <button class="btn btn-success" id="btn_export" style="flex:1">
        Export JSON
      </button>
      <button class="btn btn-outline" id="btn_new_session" style="flex:1">
        New Session
      </button>
    </div>
    <button class="btn btn-ghost" id="btn_back_interview"
      style="width:100%;margin-top:8px">← Back to Interview</button>
  </div>
</div>`;
}

// ══════════════════════════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════════════════════════
function attachEvents() {
  // ── Setup ──
  const f_rid   = document.getElementById("f_rid");
  const f_pid   = document.getElementById("f_pid");
  const f_group = document.getElementById("f_group");
  const f_lang  = document.getElementById("f_lang");
  const f_site  = document.getElementById("f_site");
  const btn_sn  = document.getElementById("btn_setup_next");

  function syncSetup() {
    if (f_rid)   S.researcherId = f_rid.value.trim();
    if (f_pid)   S.participantId = f_pid.value.trim();
    if (f_group) S.group = f_group.value;
    if (f_lang)  S.lang  = f_lang.value;
    if (f_site)  S.site  = f_site.value;
    if (btn_sn)  btn_sn.disabled = !(S.researcherId && S.participantId);
  }
  [f_rid,f_pid,f_group,f_lang,f_site].forEach(el => el && el.addEventListener("input", () => { syncSetup(); }));
  if (btn_sn) btn_sn.addEventListener("click", () => { syncSetup(); S.screen="consent"; render(); });

  // ── Consent ──
  const cb = document.getElementById("cb_consent");
  const btn_cn = document.getElementById("btn_consent_next");
  const btn_cb = document.getElementById("btn_consent_back");
  if (cb) cb.addEventListener("change", () => {
    S.consentChecked = cb.checked;
    if (btn_cn) btn_cn.disabled = !S.consentChecked;
  });
  if (btn_cn) btn_cn.addEventListener("click", () => {
    S.sessionId = genSessionId();
    S.secIdx = 0; S.qIdx = 0; S.responses = {};
    S.recState = "idle"; S.recSecs = 0;
    S.screen = "interview"; render();
  });
  if (btn_cb) btn_cb.addEventListener("click", () => { S.screen="setup"; render(); });

  // ── Section nav items ──
  document.querySelectorAll(".sec-item[data-si]").forEach(el => {
    el.addEventListener("click", () => {
      saveCurrentResponse();
      S.secIdx = parseInt(el.dataset.si);
      S.qIdx = 0;
      stopRec();
      render();
    });
  });

  // ── Record ──
  const btn_bil = document.getElementById('btn_toggle_bilingual');
  if (btn_bil) btn_bil.addEventListener('click', () => { S.showBilingual = !S.showBilingual; render(); });

  const btn_rec = document.getElementById("btn_rec");
  if (btn_rec) btn_rec.addEventListener("click", () => {
    if (S.recState === "idle" || S.recState === "done") startRec();
    else if (S.recState === "recording") stopRec();
  });

  // ── Navigation ──
  const btn_prev = document.getElementById("btn_prev");
  const btn_skip = document.getElementById("btn_skip");
  const btn_save = document.getElementById("btn_save");

  if (btn_prev) btn_prev.addEventListener("click", () => {
    saveCurrentResponse();
    stopRec();
    navigateQ(-1);
  });
  if (btn_skip) btn_skip.addEventListener("click", () => {
    const q = currentQuestion();
    setR(q.code, { status: "skip" });
    stopRec();
    const gi = globalIdx();
    const tot = totalQ();
    if (gi === tot - 1) { S.screen="summary"; render(); return; }
    navigateQ(1);
  });
  if (btn_save) btn_save.addEventListener("click", () => {
    saveCurrentResponse(true);
    stopRec();
    const gi = globalIdx();
    const tot = totalQ();
    if (gi === tot - 1) { S.screen="summary"; render(); return; }
    navigateQ(1);
  });

  // ── Summary ──
  const btn_exp = document.getElementById("btn_export");
  const btn_ns  = document.getElementById("btn_new_session");
  const btn_bi  = document.getElementById("btn_back_interview");

  if (btn_exp) btn_exp.addEventListener("click", exportSession);
  if (btn_ns)  btn_ns.addEventListener("click",  () => {
    S.screen="setup"; S.participantId=""; S.consentChecked=false;
    S.responses={}; S.recState="idle"; S.recSecs=0;
    render();
  });
  if (btn_bi) btn_bi.addEventListener("click", () => { S.screen="interview"; render(); });
}

function saveCurrentResponse(asDone=false) {
  const q = currentQuestion();
  const ta = document.getElementById("ta_transcript");
  const tn = document.getElementById("ta_notes");
  const transcript = ta ? ta.value : getR(q.code).transcript;
  const notes      = tn ? tn.value : getR(q.code).notes;
  const status     = asDone ? "done" : (transcript ? "partial" : "skip");
  setR(q.code, { transcript, notes, status,
    recSecs: S.recState==="done" ? S.recSecs : (getR(q.code).recSecs||0) });
}

function navigateQ(dir) {
  const sections = QB[S.group].sections;
  let si = S.secIdx, qi = S.qIdx + dir;
  if (qi < 0) {
    si = Math.max(0, si - 1);
    qi = sections[si].questions.length - 1;
  } else if (qi >= sections[si].questions.length) {
    si = Math.min(sections.length - 1, si + 1);
    qi = 0;
  }
  S.secIdx = si; S.qIdx = qi;
  S.recState = "idle"; S.recSecs = 0;
  render();
}

// ── Web Speech API transcription ──
const LANG_MAP = { en:"en-US", bm:"ms-MY", zh:"zh-CN", ta:"ta-IN" };
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition || null;
let _recog = null;
let _recInterval = null;
let _interimEl = null;   // live interim display
let _finalBuf  = "";     // accumulated final text this session

function sttSupported() { return !!SpeechRec; }

function startRec() {
  if (!sttSupported()) {
    alert("Speech recognition is not supported in this browser.\nUse Chrome or Edge for embedded transcription.");
    return;
  }

  S.recState = "recording"; S.recSecs = 0;
  _finalBuf = (document.getElementById("ta_transcript")?.value || "").trim();

  // Timer
  clearInterval(_recInterval);
  _recInterval = setInterval(() => {
    S.recSecs++;
    const rt = document.querySelector(".rec-timer");
    if (rt) { rt.classList.remove("idle"); rt.textContent = fmtTime(S.recSecs); }
  }, 1000);

  // Recogniser
  _recog = new SpeechRec();
  _recog.lang = LANG_MAP[S.lang] || "en-US";
  _recog.continuous      = true;
  _recog.interimResults  = true;
  _recog.maxAlternatives = 1;

  _recog.onstart = () => {
    const rs = document.querySelector(".rec-status");
    if (rs) rs.textContent = "🔴 Listening… tap ⏹ to stop";
    const btn = document.getElementById("btn_rec");
    if (btn) { btn.className = "rec-btn recording"; btn.textContent = "⏹"; }
  };

  _recog.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        _finalBuf += (_finalBuf ? " " : "") + t.trim();
      } else {
        interim = t;
      }
    }
    const ta = document.getElementById("ta_transcript");
    if (ta) {
      ta.value = _finalBuf + (interim ? " " + interim : "");
      ta.classList.add("live");
      ta.scrollTop = ta.scrollHeight;
    }
    const rs = document.querySelector(".rec-status");
    if (rs) rs.textContent = interim
      ? `🔴 Hearing: "${interim.substring(0,60)}${interim.length>60?"…":""}"`
      : "🔴 Listening…";
  };

  _recog.onerror = (e) => {
    const msgs = {
      "no-speech":         "No speech detected — tap 🎙 to try again.",
      "audio-capture":     "Microphone not found. Check browser permissions.",
      "not-allowed":       "Microphone access denied. Allow microphone in browser settings.",
      "network":           "Network error — speech recognition requires an internet connection on some browsers.",
      "language-not-supported": `Language '${LANG_MAP[S.lang]}' not supported on this device. Try English.`,
    };
    const rs = document.querySelector(".rec-status");
    if (rs) rs.textContent = msgs[e.error] || `Error: ${e.error}`;
    _finishRec();
  };

  _recog.onend = () => {
    // Auto-restart if still in recording state (recognition times out ~60s on some browsers)
    if (S.recState === "recording") {
      try { _recog.start(); } catch(e) { _finishRec(); }
    }
  };

  try {
    _recog.start();
  } catch(e) {
    const rs = document.querySelector(".rec-status");
    if (rs) rs.textContent = "Could not start microphone: " + e.message;
    S.recState = "idle";
  }
}

function stopRec() {
  clearInterval(_recInterval);
  if (S.recState === "recording") {
    S.recState = "processing";
    const rs = document.querySelector(".rec-status");
    if (rs) rs.textContent = "Finalising transcript…";
    const btn = document.getElementById("btn_rec");
    if (btn) { btn.className = "rec-btn processing"; btn.textContent = "⏳"; }
    if (_recog) {
      try { _recog.stop(); } catch(e) {}
    }
    // Give recogniser 800ms to flush final result, then finish
    setTimeout(_finishRec, 800);
  } else {
    S.recState = "idle";
    if (_recog) { try { _recog.abort(); } catch(e) {} _recog = null; }
  }
}

function _finishRec() {
  clearInterval(_recInterval);
  if (_recog) { try { _recog.abort(); } catch(e) {} _recog = null; }
  S.recState = "done";

  const ta = document.getElementById("ta_transcript");
  if (ta) {
    // Ensure final buffer is flushed to textarea
    if (_finalBuf && !ta.value.trim()) ta.value = _finalBuf;
    ta.classList.add("live");
  }
  const btn = document.getElementById("btn_rec");
  if (btn) { btn.className = "rec-btn idle"; btn.textContent = "🎙"; }
  const rs = document.querySelector(".rec-status");
  if (rs) rs.textContent = "✅ Transcription done — edit below if needed. Tap 🎙 to continue recording.";
}

// ── Export ──
function exportSession() {
  const qs = allQuestions();
  const payload = {
    meta: {
      sessionId: S.sessionId,
      participantId: S.participantId,
      researcherId: S.researcherId,
      group: S.group,
      language: S.lang,
      site: S.site,
      exportedAt: new Date().toISOString(),
      totalQ: qs.length,
      completed: qs.filter(q => getR(q.code).status==="done").length,
    },
    responses: qs.map(q => {
      const r = getR(q.code);
      return {
        code: q.code,
        question: q.text,
        probe: q.probe,
        transcript: r.transcript,
        researcherNotes: r.notes,
        recordedSecs: r.recSecs || 0,
        status: r.status,
      };
    })
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${S.sessionId}.json`;
  a.click();
}

// ── Boot ──
render();
</script>
